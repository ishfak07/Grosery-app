<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Puttalam Drop</title>
    <meta
      name="description"
      content="Privacy and account support for the Puttalam Drop app."
    >
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header>
      <div class="header-inner">
        <p class="brand">Puttalam Drop</p>
        <h1>App support and privacy</h1>
      </div>
    </header>
    <main>
      <section class="card">
        <h2>Privacy policy</h2>
        <p>Learn what the app collects, why it is used, and how it is retained.</p>
        <a class="button" href="/privacy">Read privacy policy</a>
      </section>
      <section class="card">
        <h2>Delete your account</h2>
        <p>
          Customers can delete their account inside the app or submit a request
          from the web.
        </p>
        <a class="button" href="/delete-account">Account deletion</a>
      </section>
    </main>
    <footer>Copyright 2026 Puttalam Drop.</footer>
  </body>
</html>
